name: Build

on:
  push:
  pull_request:
  release:
    types: [published]

jobs:
  assemble:
    name: Assemble
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Build libre flavor
        run: ./gradlew assembleDebug
      - name: Build jellow flavor (phone arm64)
        run: ./gradlew :app:phone:assembleJellowDebug
      - name: Upload Jellow APK
        uses: actions/upload-artifact@v7
        with:
          name: jellow-phone-arm64-v8a-debug.apk
          path: ./app/phone/build/outputs/apk/jellow/debug/phone-jellow-arm64-v8a-debug.apk
      - name: Upload to Release
        if: github.event_name == 'release'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./app/phone/build/outputs/apk/jellow/debug/phone-jellow-arm64-v8a-debug.apk
          asset_name: jellow-phone-arm64-v8a-debug.apk
          asset_content_type: application/vnd.android.package-archive
